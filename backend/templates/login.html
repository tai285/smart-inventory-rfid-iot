<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Smart Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm mx-4">
    <!-- Logo / brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 shadow-lg mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-tight">Smart Inventory</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
          <input id="username" type="text" required autocomplete="username"
            class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm
                   focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
            placeholder="admin" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm
                   focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
            placeholder="••••••••" />
        </div>

        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm
                                   rounded-lg px-3.5 py-2.5"></div>

        <button type="submit" id="submit-btn"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold text-sm
                 hover:bg-indigo-700 active:scale-95 transition-all">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      Default: <span class="font-mono">admin</span> / <span class="font-mono">admin123</span>
    </p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.classList.add('hidden');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Login failed';
          err.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        err.textContent = 'Network error — is the server running?';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
